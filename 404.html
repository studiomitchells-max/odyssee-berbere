<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="shortcut icon" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable — Odyssée Berbère</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gloock:ital,wght@0,300;0,400;1,300;1,400&family=Outfit:opsz,wght@9..40,300;9..40,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --terracotta: #C06B3C; --vert: #2D4A3E; --sable: #F5ECD7; --noir: #1A1208; }

    html, body {
      height: 100%;
      font-family: 'Outfit', sans-serif;
      background: var(--noir);
      color: #fff;
    }

    .bg {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(160deg, rgba(45,74,62,.85) 0%, rgba(26,18,8,.97) 60%),
        url('images/story/histoire.jpg') center/cover no-repeat;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }

    .logo {
      font-family: 'Gloock', serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 400;
      letter-spacing: 0.04em;
      color: #fff;
      text-decoration: none;
      display: block;
      margin-bottom: 60px;
    }
    .logo span {
      display: block;
      font-family: 'Outfit', sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,.4);
      margin-top: 4px;
    }

    .num {
      font-family: 'Gloock', serif;
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 300;
      line-height: 1;
      color: transparent;
      -webkit-text-stroke: 1px rgba(192,107,60,.5);
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .sep {
      width: 40px;
      height: 1px;
      background: var(--terracotta);
      margin: 0 auto 32px;
      opacity: .7;
    }

    .titre {
      font-family: 'Gloock', serif;
      font-size: clamp(1.4rem, 3.5vw, 2.2rem);
      font-weight: 300;
      margin-bottom: 16px;
    }
    .titre em { font-style: italic; color: #e8c49a; }

    .desc {
      font-size: 14px;
      color: rgba(255,255,255,.5);
      line-height: 1.7;
      max-width: 360px;
      margin: 0 auto 40px;
    }

    .btn {
      display: inline-block;
      padding: 14px 32px;
      border: 1px solid rgba(192,107,60,.6);
      color: #e8c49a;
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border-radius: 50px;
      transition: background .2s, color .2s;
    }
    .btn:hover {
      background: var(--terracotta);
      color: #fff;
      border-color: var(--terracotta);
    }

    .footer {
      position: absolute;
      bottom: 20px;
      font-size: 11px;
      color: rgba(255,255,255,.15);
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="page">
    <a href="index.html" class="logo">
      Odyssée Berbère
      <span>Artisanat & Décoration</span>
    </a>

    <div class="num">404</div>
    <div class="sep"></div>

    <h1 class="titre">Cette page s'est <em>égarée</em><br>quelque part au Maroc…</h1>
    <p class="desc">La pièce que vous cherchez n'existe pas ou a été déplacée. Retournez à l'accueil pour explorer notre sélection.</p>

    <a href="index.html" class="btn">Retour à l'accueil</a>
  </div>
  <p class="footer">© 2026 Odyssée Berbère</p>
</body>
</html>
